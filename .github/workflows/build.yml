name: Build and Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven
        run: mvn clean verify -B

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eclipse-themes-updatesite
          path: releng/com.github.eclipsethemes.updatesite/target/repository/
          retention-days: 90

  deploy-updatesite:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: eclipse-themes-updatesite
          path: updatesite/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./updatesite
          publish_branch: gh-pages

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: eclipse-themes-updatesite
          path: updatesite/

      - name: Create release archive
        run: |
          cd updatesite
          zip -r ../eclipse-themes-updatesite-${{ github.event.release.tag_name }}.zip .
          cd ..

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: eclipse-themes-updatesite-${{ github.event.release.tag_name }}.zip
